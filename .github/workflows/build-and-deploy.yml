name: Build and Deploy Mobile Apps

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same workflow and ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Android Build and Deploy
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    environment: MOBILE_RELEASE
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze
        continue-on-error: true

      - name: Determine version
        id: version
        run: |
          # Read version from pubspec.yaml
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/version://g' | tr -d '[:space:]')
          
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # For tags, use tag name as version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            # For non-tag builds, extract version from pubspec.yaml
            if [[ "$VERSION_LINE" == *+* ]]; then
              VERSION="${VERSION_LINE%%+*}"
            else
              VERSION="$VERSION_LINE"
            fi
          fi
          
          # Extract build number from pubspec.yaml
          if [[ "$VERSION_LINE" == *+* ]]; then
            BUILD_NUMBER="${VERSION_LINE##*+}"
          else
            # If no build number in pubspec.yaml, use GitHub run number
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION+$BUILD_NUMBER"

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [[ -z "$GOOGLE_SERVICES_JSON_BASE64" ]]; then
            echo "Error: GOOGLE_SERVICES_JSON_BASE64 secret is required"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_PASSWORD" ]] || [[ -z "$ANDROID_KEY_ALIAS" ]] || [[ -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Error: ANDROID_KEYSTORE_* secrets are required"
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android APK (for testing)
        run: |
          flutter build apk \
            --release \
            --build-name=${{ steps.version.outputs.VERSION }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Build Android App Bundle (for Play Store)
        if: github.ref_type == 'tag'
        run: |
          flutter build appbundle \
            --release \
            --build-name=${{ steps.version.outputs.VERSION }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Google Play Internal Testing
        if: github.ref_type == 'tag'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.aprilzz.linu
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: android/whatsnew
          inAppUpdatePriority: 2

      - name: Create GitHub Release (Android)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false

  # iOS Build and Deploy
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    environment: MOBILE_RELEASE
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze
        continue-on-error: true

      - name: Determine version
        id: version
        run: |
          # Read version from pubspec.yaml
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/version://g' | tr -d '[:space:]')
          
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # For tags, use tag name as version
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            # For non-tag builds, extract version from pubspec.yaml
            if [[ "$VERSION_LINE" == *+* ]]; then
              VERSION="${VERSION_LINE%%+*}"
            else
              VERSION="$VERSION_LINE"
            fi
          fi
          
          # Extract build number from pubspec.yaml
          if [[ "$VERSION_LINE" == *+* ]]; then
            BUILD_NUMBER="${VERSION_LINE##*+}"
          else
            # If no build number in pubspec.yaml, use GitHub run number
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION+$BUILD_NUMBER"

      - name: Decode iOS Configuration Files
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          if [[ -z "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]]; then
            echo "Error: IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 secret is required"
            exit 1
          fi
          if [[ -z "$EXPORT_OPTIONS_PLIST_BASE64" ]]; then
            echo "Error: IOS_EXPORT_OPTIONS_PLIST_BASE64 secret is required"
            exit 1
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 -d > ios/Runner/GoogleService-Info.plist
          echo "$EXPORT_OPTIONS_PLIST_BASE64" | base64 -d > ios/ExportOptions.plist

      - name: Install Apple Certificate and Provisioning Profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_PROVISION_PROFILE_EXT_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_EXT_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import certificate
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Install provisioning profile for main app
          if [[ -z "$IOS_PROVISION_PROFILE_BASE64" ]]; then
            echo "Error: IOS_PROVISION_PROFILE_BASE64 secret is required for com.aprilzz.linu"
            exit 1
          fi
          PROVISION_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROVISION_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROVISION_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

          # Install provisioning profile for LinuNotificationService extension
          if [[ -z "$IOS_PROVISION_PROFILE_EXT_BASE64" ]]; then
            echo "Error: IOS_PROVISION_PROFILE_EXT_BASE64 secret is required for com.aprilzz.linu.LinuNotificationService"
            exit 1
          fi
          EXT_PROVISION_PATH="$RUNNER_TEMP/profile_ext.mobileprovision"
          echo "$IOS_PROVISION_PROFILE_EXT_BASE64" | base64 -d > "$EXT_PROVISION_PATH"
          cp "$EXT_PROVISION_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Extract UUIDs and Team ID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$PROVISION_PATH"))
          EXT_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$EXT_PROVISION_PATH"))
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< $(security cms -D -i "$PROVISION_PATH"))
          
          echo "Main Profile UUID: $UUID"
          echo "Extension Profile UUID: $EXT_UUID"
          echo "Team ID: $TEAM_ID"
          
          # Modify project.pbxproj to use manual signing
          PBXPROJ_PATH="ios/Runner.xcodeproj/project.pbxproj"
          
          # 1. Disable automatic signing
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ_PATH"
          
          # 2. Set Team ID
          if [[ -n "$TEAM_ID" ]]; then
            sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ_PATH"
          fi
          
          # 3. Set Provisioning Profile for Main App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = com.aprilzz.linu;/PRODUCT_BUNDLE_IDENTIFIER = com.aprilzz.linu; PROVISIONING_PROFILE_SPECIFIER = \"$UUID\";/g" "$PBXPROJ_PATH"
          
          # 4. Set Provisioning Profile for Extension
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = com.aprilzz.linu.LinuNotificationServiceExtension;/PRODUCT_BUNDLE_IDENTIFIER = com.aprilzz.linu.LinuNotificationServiceExtension; PROVISIONING_PROFILE_SPECIFIER = \"$EXT_UUID\";/g" "$PBXPROJ_PATH"
          
          # 5. Set Code Sign Identity to Distribution
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "iPhone Distribution";/g' "$PBXPROJ_PATH"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Distribution";/g' "$PBXPROJ_PATH"
          
          # Set default keychain
          security list-keychains -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --build-name=${{ steps.version.outputs.VERSION }} \
            --build-number=${{ steps.version.outputs.BUILD_NUMBER }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Locate IPA artifact
        run: |
          IPA_FILES=$(find build/ios/ipa -maxdepth 1 -type f -name '*.ipa' | sort)
          if [[ -z "$IPA_FILES" ]]; then
            echo "Error: No IPA files found in build/ios/ipa"
            exit 1
          fi
          IPA_COUNT=$(printf '%s\n' "$IPA_FILES" | sed '/^$/d' | wc -l | tr -d ' ')
          if [[ "$IPA_COUNT" -gt 1 ]]; then
            echo "Error: Expected 1 IPA, found $IPA_COUNT"
            exit 1
          fi
          IPA_PATH=$(printf '%s\n' "$IPA_FILES" | head -n1)
          echo "Located IPA: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Prepare App Store Connect API Key Content
        if: github.ref_type == 'tag'
        id: prepare_api_key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode base64 to get the raw .p8 content
          API_KEY_CONTENT=$(echo "$API_KEY_BASE64" | base64 -d)
          
          # Mask the secret content to prevent it from appearing in logs
          # Escape newlines to %0A to ensure the add-mask command is processed as a single line
          API_KEY_ESCAPED="${API_KEY_CONTENT//$'\n'/'%0A'}"
          echo "::add-mask::$API_KEY_ESCAPED"
          
          # Verify it looks like a valid P8 key
          if ! echo "$API_KEY_CONTENT" | head -n 1 | grep -q "BEGIN PRIVATE KEY"; then
            echo "Error: Decoded API key does not appear to be a valid P8 key"
            exit 1
          fi
          
          # Write key to the default search path for altool
          # This prevents the key content from being exposed in environment variables or logs
          mkdir -p ~/private_keys
          echo "$API_KEY_CONTENT" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          
          echo "API key prepared at ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8"

      - name: Deploy to App Store Connect
        if: github.ref_type == 'tag'
        env:
          IPA_PATH: ${{ env.IPA_PATH }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          echo "Uploading IPA to TestFlight..."
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose

      - name: Create GitHub Release (iOS)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/*.ipa
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]] && [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
